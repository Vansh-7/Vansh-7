name: Generate contribution snake

on:
  schedule:
    - cron: "17 18 * * *"
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate snake SVGs
        uses: Platane/snk@v3
        with:
          github_user_name: Vansh-7
          outputs: |
            dist/github-contribution-grid-snake.svg?palette=github-light&color_snake=F6CF57
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=F6CF57

      - name: Publish generated SVGs
        uses: crazy-max/ghaction-github-pages@v5
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}